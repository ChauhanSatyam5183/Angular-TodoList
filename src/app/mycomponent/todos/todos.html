
<div class="container">

    <div>
        <app-add-todo-item (addTodoEvent)="addTodo($event)">
            
            
        </app-add-todo-item>
    </div>
    <h4>Yours Todo </h4>
<div *ngIf="todos.length > 0; else noTodos">
    
    <div *ngFor="let todo of todos">
    <app-todo-item 
      [todo]="todo"
      (todoDelete)="deleteTodo($event)">
    </app-todo-item>
</div>

</div>

<!-- else block -->
<ng-template #noTodos>
    <h6>No Todos to display</h6>
</ng-template>
</div>

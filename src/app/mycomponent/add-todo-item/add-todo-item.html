<div class="my-3">
  <h4>Add Todo</h4>

  <form (ngSubmit)="onSubmit()">  

    <div class="mb-3">
      <label class="form-label">Title</label>
      <input 
        type="text" 
        class="form-control"
        [(ngModel)]="title" 
        name="title"   
      >
    </div>

    <div class="mb-3">
      <label class="form-label">Description</label>
      <input 
        type="text" 
        class="form-control"
        [(ngModel)]="desc" 
        name="desc"  
      >
    </div>

    <button type="submit" class="btn btn-primary btn-sm my-3">
      Submit
    </button>
  </form>
</div>
